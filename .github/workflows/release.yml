# Think Better — Automated Release Pipeline
# Triggered on version tags (e.g., v1.0.0)
# Builds cross-platform binaries and creates a GitHub Release

name: Release

on:
  push:
    tags: ['v*']

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Prepare embedded skills
        run: make embed-prep

      - name: Build all platforms
        run: make build-all

      - name: Generate checksums
        run: |
          cd bin
          sha256sum think-better-* > checksums.txt
          cat checksums.txt

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            bin/think-better-*
            bin/checksums.txt
